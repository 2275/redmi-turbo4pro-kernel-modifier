# =========================================================
# AnyBase Kernel (ABK) 自定义外部模块规范配置文件
# =========================================================

# [必填] 模块核心名称（对应报错：ABK_MODULE_NAME）
ABK_MODULE_NAME="Redmi Turbo 4 Pro LTO Fixer"

# [必填] 模块唯一ID，仅限英文、数字和下划线
ABK_MODULE_ID="redmi_turbo4pro_modifier"

# [选填] 模块作者与版本信息
ABK_MODULE_AUTHOR="2275"
ABK_MODULE_VERSION="1.0.0"
ABK_MODULE_DESCRIPTION="强制关闭内核 LTO 优化，确保 SukiSU 内联挂钩生效"

# [必填] 执行生命周期与脚本指定
# 声明在内核开始正式编译的前置阶段执行
ABK_MODULE_STAGE="pre_build"
ABK_MODULE_SCRIPT="setup.sh"
